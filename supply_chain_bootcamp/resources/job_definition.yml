resources:
  jobs:
    supply_chain_bronze_ingestion:
      name: supply_chain_bronze_ingestion
      parameters:
        - name: run_date
          default: ""
          description: Optional run date for this workflow execution; when provided, format must be YYYY-MM-DD
      tasks:
        - task_key: ingest_raw_sales
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ./src/sql/bronze_ingest_sales.sql
              source: WORKSPACE
        - task_key: ingest_raw_inventory
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ./src/sql/bronze_ingest_inventory.sql
              source: WORKSPACE
    supply_chain_silver_transform:
      name: supply_chain_silver_transform
      parameters:
        - name: run_date
          default: ""
          description: Optional run date for this workflow execution; when provided, format must be YYYY-MM-DD
      tasks:
        - task_key: transform_silver_sales
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ./src/sql/silver_transform_sales.sql
              source: WORKSPACE
        - task_key: transform_silver_inventory
          depends_on:
            - task_key: transform_silver_sales
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ./src/sql/silver_transform_inventory.sql
              source: WORKSPACE
    supply_chain_medallion_orchestration:
      name: supply_chain_medallion_orchestration
      parameters:
        - name: run_date
          default: ""
          description: Optional run date for this workflow execution; when provided, format must be YYYY-MM-DD
      tasks:
        - task_key: run_bronze_job
          run_job_task:
            job_id: ${resources.jobs.supply_chain_bronze_ingestion.id}
            job_parameters:
              run_date: "{{job.parameters.run_date}}"
        - task_key: run_silver_job
          depends_on:
            - task_key: run_bronze_job
          run_job_task:
            job_id: ${resources.jobs.supply_chain_silver_transform.id}
            job_parameters:
              run_date: "{{job.parameters.run_date}}"
