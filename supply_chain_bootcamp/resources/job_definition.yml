resources:
  jobs:
    supply_chain_bronze_ingest:
      name: supply_chain_bronze_ingest
      environments:
        - environment_key: default
          spec:
            client: "1"
      tasks:
        - task_key: ingest_bronze_sales
          spark_python_task:
            python_file: ../src/bronze/ingest_bronze.py
            parameters:
              - --catalog
              - ${var.catalog_name}
              - --schema
              - ${var.schema_name}
              - --source-path
              - ${var.source_path}
              - --source-file-pattern
              - ${var.sales_file_pattern}
              - --bronze-table
              - bronze_sales
              - --checkpoint-path
              - ${var.sales_checkpoint_path}
              - --schema-location
              - ${var.sales_schema_location}
              - --job-run-id
              - "{{job.run_id}}"
          environment_key: default
        - task_key: ingest_bronze_inventory
          spark_python_task:
            python_file: ../src/bronze/ingest_bronze.py
            parameters:
              - --catalog
              - ${var.catalog_name}
              - --schema
              - ${var.schema_name}
              - --source-path
              - ${var.source_path}
              - --source-file-pattern
              - ${var.inventory_file_pattern}
              - --bronze-table
              - bronze_inventory
              - --checkpoint-path
              - ${var.inventory_checkpoint_path}
              - --schema-location
              - ${var.inventory_schema_location}
              - --job-run-id
              - "{{job.run_id}}"
          environment_key: default
    supply_chain_silver_transform:
      name: supply_chain_silver_transform
      environments:
        - environment_key: default
          spec:
            client: "1"
      tasks:
        - task_key: transform_silver_sales
          spark_python_task:
            python_file: ../src/silver/transform_silver.py
            parameters:
              - --catalog
              - ${var.catalog_name}
              - --schema
              - ${var.schema_name}
              - --entity
              - sales
              - --checkpoint-path
              - ${var.silver_sales_checkpoint_path}
              - --job-run-id
              - "{{job.run_id}}"
          environment_key: default
        - task_key: transform_silver_inventory
          spark_python_task:
            python_file: ../src/silver/transform_silver.py
            parameters:
              - --catalog
              - ${var.catalog_name}
              - --schema
              - ${var.schema_name}
              - --entity
              - inventory
              - --checkpoint-path
              - ${var.silver_inventory_checkpoint_path}
              - --job-run-id
              - "{{job.run_id}}"
          environment_key: default
    supply_chain_gold_serve:
      name: supply_chain_gold_serve
      environments:
        - environment_key: default
          spec:
            client: "1"
      tasks:
        - task_key: build_gold_daily_sales
          spark_python_task:
            python_file: ../src/gold/serve_gold.py
            parameters:
              - --catalog
              - ${var.catalog_name}
              - --schema
              - ${var.schema_name}
              - --entity
              - sales
              - --job-run-id
              - "{{job.run_id}}"
          environment_key: default
        - task_key: build_gold_low_stock_alerts
          spark_python_task:
            python_file: ../src/gold/serve_gold.py
            parameters:
              - --catalog
              - ${var.catalog_name}
              - --schema
              - ${var.schema_name}
              - --entity
              - inventory
              - --job-run-id
              - "{{job.run_id}}"
          environment_key: default
    supply_chain_medallion_orchestration:
      name: supply_chain_medallion_orchestration
      environments:
        - environment_key: default
          spec:
            client: "1"
      tasks:
        - task_key: run_bronze_job
          run_job_task:
            job_id: ${resources.jobs.supply_chain_bronze_ingest.id}
        - task_key: run_silver_job
          depends_on:
            - task_key: run_bronze_job
          run_job_task:
            job_id: ${resources.jobs.supply_chain_silver_transform.id}
        - task_key: run_gold_job
          depends_on:
            - task_key: run_silver_job
          run_job_task:
            job_id: ${resources.jobs.supply_chain_gold_serve.id}
    supply_chain_unit_tests:
      name: supply_chain_unit_tests
      environments:
        - environment_key: default
          spec:
            client: "1"
      tasks:
        - task_key: run_unnest_sales_items_tests
          spark_python_task:
            python_file: ../tests/run_databricks_tests.py
          environment_key: default
