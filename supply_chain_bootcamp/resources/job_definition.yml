resources:
  jobs:
    supply_chain_bronze_ingestion:
      name: supply_chain_bronze_ingestion
      environments:
        - environment_key: default
          spec:
            client: "1"
      parameters:
        - name: run_date
          default: ""
      tasks:
        - task_key: ingest_raw_sales
          spark_python_task:
            python_file: ../src/bronze/ingest_raw.py
            parameters:
              - --catalog
              - ${var.catalog_name}
              - --schema
              - ${var.schema_name}
              - --source-path
              - ${var.source_path}
              - --source-file-pattern
              - ${var.sales_file_pattern}
              - --bronze-table
              - bronze_sales
              - --checkpoint-path
              - ${var.sales_checkpoint_path}
              - --schema-location
              - ${var.sales_schema_location}
              - --run-date
              - "{{job.parameters.run_date}}"
          environment_key: default
        - task_key: ingest_raw_inventory
          spark_python_task:
            python_file: ../src/bronze/ingest_raw.py
            parameters:
              - --catalog
              - ${var.catalog_name}
              - --schema
              - ${var.schema_name}
              - --source-path
              - ${var.source_path}
              - --source-file-pattern
              - ${var.inventory_file_pattern}
              - --bronze-table
              - bronze_inventory
              - --checkpoint-path
              - ${var.inventory_checkpoint_path}
              - --schema-location
              - ${var.inventory_schema_location}
              - --run-date
              - "{{job.parameters.run_date}}"
          environment_key: default
    supply_chain_silver_transform:
      name: supply_chain_silver_transform
      environments:
        - environment_key: default
          spec:
            client: "1"
      parameters:
        - name: run_date
          default: ""
      tasks:
        - task_key: transform_silver_sales
          spark_python_task:
            python_file: ../src/silver/build_silver.py
            parameters:
              - --catalog
              - ${var.catalog_name}
              - --schema
              - ${var.schema_name}
              - --entity
              - sales
              - --checkpoint-path
              - ${var.silver_sales_checkpoint_path}
               - --run-date
               - "{{job.parameters.run_date}}"
          environment_key: default
        - task_key: transform_silver_inventory
          spark_python_task:
            python_file: ../src/silver/build_silver.py
            parameters:
              - --catalog
              - ${var.catalog_name}
              - --schema
              - ${var.schema_name}
              - --entity
              - inventory
              - --checkpoint-path
              - ${var.silver_inventory_checkpoint_path}
              - --run-date
              - "{{job.parameters.run_date}}"
          environment_key: default
    supply_chain_medallion_orchestration:
      name: supply_chain_medallion_orchestration
      environments:
        - environment_key: default
          spec:
            client: "1"
      parameters:
        - name: run_date
          default: ""
      tasks:
        - task_key: run_bronze_job
          run_job_task:
            job_id: ${resources.jobs.supply_chain_bronze_ingestion.id}
            job_parameters:
              run_date: "{{job.parameters.run_date}}"
        - task_key: run_silver_job
          depends_on:
            - task_key: run_bronze_job
          run_job_task:
            job_id: ${resources.jobs.supply_chain_silver_transform.id}
            job_parameters:
              run_date: "{{job.parameters.run_date}}"
