resources:
  jobs:
    supply_chain_bronze_ingestion:
      name: supply_chain_bronze_ingestion
      parameters:
        - name: run_date
          default: ""
          description: Optional run date for this workflow execution; when provided, format must be YYYY-MM-DD
      tasks:
        - task_key: ingest_raw_sales
          spark_python_task:
            python_file: ./src/bronze/ingest_raw.py
            parameters:
              - --source-path
              - ${var.source_path}
              - --source-file-pattern
              - ${var.sales_file_pattern}
              - --bronze-table
              - bronze_sales
              - --checkpoint-path
              - ${var.sales_checkpoint_path}
              - --schema-location
              - ${var.sales_schema_location}
              - --run-date
              - "{{job.parameters.run_date}}"
          job_cluster_key: bronze_ingest_cluster
        - task_key: ingest_raw_inventory
          spark_python_task:
            python_file: ./src/bronze/ingest_raw.py
            parameters:
              - --source-path
              - ${var.source_path}
              - --source-file-pattern
              - ${var.inventory_file_pattern}
              - --bronze-table
              - bronze_inventory
              - --checkpoint-path
              - ${var.inventory_checkpoint_path}
              - --schema-location
              - ${var.inventory_schema_location}
              - --run-date
              - "{{job.parameters.run_date}}"
          job_cluster_key: bronze_ingest_cluster
      job_clusters:
        - job_cluster_key: bronze_ingest_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 1
