bundle:
  name: supply_chain_bootcamp

include:
  - resources/*.yml

variables:
  workspace_host:
    description: Azure Databricks workspace URL
    default: https://adb-1234567890123456.7.azuredatabricks.net
  source_path:
    description: Cloud storage path for raw supply chain files
    default: abfss://<container>@<storage-account>.dfs.core.windows.net/supply_chain/raw
  sales_checkpoint_path:
    description: Checkpoint location for Bronze sales ingestion stream
    default: abfss://<container>@<storage-account>.dfs.core.windows.net/supply_chain/checkpoints/bronze_sales
  sales_schema_location:
    description: Schema tracking location for Bronze sales Auto Loader stream
    default: abfss://<container>@<storage-account>.dfs.core.windows.net/supply_chain/schemas/bronze_sales
  sales_file_pattern:
    description: File discovery pattern for sales raw file ingestion
    default: sales_raw.jsonl
  inventory_checkpoint_path:
    description: Checkpoint location for Bronze inventory ingestion stream
    default: abfss://<container>@<storage-account>.dfs.core.windows.net/supply_chain/checkpoints/bronze_inventory
  inventory_schema_location:
    description: Schema tracking location for Bronze inventory Auto Loader stream
    default: abfss://<container>@<storage-account>.dfs.core.windows.net/supply_chain/schemas/bronze_inventory
  inventory_file_pattern:
    description: File discovery pattern for inventory raw file ingestion
    default: inventory_raw.jsonl

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: ${var.workspace_host}
