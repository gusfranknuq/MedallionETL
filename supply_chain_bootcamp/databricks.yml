bundle:
  name: supply_chain_bootcamp

include:
  - resources/*.yml

variables:
  catalog_name:
    description: Unity Catalog catalog name
    default: supply_chain
  schema_name:
    description: Unity Catalog schema name
    default: supply_chain
  serverless_enabled:
    description: Enable serverless job compute for workflow tasks
    default: true
  source_path:
    description: Unity Catalog Volume path for raw supply chain files
    default: /Volumes/supply_chain/supply_chain/raw_sample_files
  sales_checkpoint_path:
    description: Checkpoint location for Bronze sales ingestion stream
    default: /Volumes/supply_chain/supply_chain/raw_sample_files/_state/checkpoints/bronze_sales
  sales_schema_location:
    description: Schema tracking location for Bronze sales Auto Loader stream
    default: /Volumes/supply_chain/supply_chain/raw_sample_files/_state/schemas/bronze_sales
  sales_file_pattern:
    description: File discovery pattern for sales raw file ingestion
    default: sales_raw.jsonl
  inventory_checkpoint_path:
    description: Checkpoint location for Bronze inventory ingestion stream
    default: /Volumes/supply_chain/supply_chain/raw_sample_files/_state/checkpoints/bronze_inventory
  inventory_schema_location:
    description: Schema tracking location for Bronze inventory Auto Loader stream
    default: /Volumes/supply_chain/supply_chain/raw_sample_files/_state/schemas/bronze_inventory
  inventory_file_pattern:
    description: File discovery pattern for inventory raw file ingestion
    default: inventory_raw.jsonl
  silver_sales_checkpoint_path:
    description: Checkpoint location for Silver sales transformation stream
    default: /Volumes/supply_chain/supply_chain/raw_sample_files/_state/checkpoints/silver_sales
  silver_inventory_checkpoint_path:
    description: Checkpoint location for Silver inventory transformation stream
    default: /Volumes/supply_chain/supply_chain/raw_sample_files/_state/checkpoints/silver_inventory

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-dd9f607b-9d71.cloud.databricks.com
