bundle:
  name: supply_chain_bootcamp

include:
  - resources/*.yml

variables:
  workspace_host:
    description: Databricks workspace URL
    default: https://dbc-55232ca1-31c5.cloud.databricks.com
  catalog_name:
    description: Unity Catalog catalog name
    default: workspace
  schema_name:
    description: Unity Catalog schema name
    default: supply_chain
  sql_warehouse_id:
    description: SQL Warehouse ID used by SQL tasks
    default: 96c0df0e89c40847
  source_path:
    description: Unity Catalog Volume path for raw supply chain files
    default: /Volumes/workspace/supply_chain/raw_sample_files
  sales_file_pattern:
    description: File discovery pattern for sales raw file ingestion
    default: sales_raw.jsonl
  inventory_file_pattern:
    description: File discovery pattern for inventory raw file ingestion
    default: inventory_raw.jsonl

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: ${var.workspace_host}
